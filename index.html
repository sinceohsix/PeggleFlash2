<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Peggle Loader</title>
  <style>
    body { font-family: sans-serif; margin: 16px; }
    label { display: block; margin-top: 10px; }
    input, button { margin-top: 4px; display: block; }
    #ruffle-container { margin-top: 16px; width: 640px; height: 480px; background: #000; }
    #ruffle-container ruffle-player { width: 100%; height: 100%; }
    #status { margin-top: 8px; font-size: 12px; color: #555; }
  </style>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

  <label>Level.zip:
    <input type="file" id="input-bundle" accept=".zip" />
  </label>
  <button id="btn-restart">(Re)start Ruffle</button>
  <div id="status">Ready.</div>
  <div id="ruffle-container"></div>

<script>
  const TARGET_DAT = 'funnel.dat.zip';
  const TARGET_JPG = 'funnel.jpg';

  const overrides = {};
  let playerEl = null;

  function status(msg) {
    document.getElementById('status').textContent = msg;
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(() => {
      status('Service worker registered.');
    }).catch(err => {
      status('SW error: ' + err.message);
    });
  } else {
    status('Service workers not supported.');
  }

  async function getActiveSW() {
    const reg = await navigator.serviceWorker.ready;
    if (reg.active) return reg.active;
    return new Promise(resolve => {
      const sw = reg.installing || reg.waiting;
      sw.addEventListener('statechange', function handler() {
        if (this.state === 'activated') {
          sw.removeEventListener('statechange', handler);
          resolve(this);
        }
      });
    });
  }

  function sendOne(active, filename, buffer) {
    const copy = buffer.slice(0);
    return new Promise(resolve => {
      const handler = e => {
        if (e.data.type === 'ACK' && e.data.filename === filename) {
          navigator.serviceWorker.removeEventListener('message', handler);
          resolve();
        }
      };
      navigator.serviceWorker.addEventListener('message', handler);
      active.postMessage({ type: 'OVERRIDE', filename, buffer: copy }, [copy]);
    });
  }

  function sendClear(active) {
    return new Promise(resolve => {
      const handler = e => {
        if (e.data.type === 'ACK' && e.data.action === 'CLEAR') {
          navigator.serviceWorker.removeEventListener('message', handler);
          resolve();
        }
      };
      navigator.serviceWorker.addEventListener('message', handler);
      active.postMessage({ type: 'CLEAR' });
    });
  }

  async function sendOverridesToSW() {
    status('Waiting for service worker...');
    const active = await getActiveSW();
    await sendClear(active);
    for (const [filename, buffer] of Object.entries(overrides)) {
      await sendOne(active, filename, buffer);
      status('SW confirmed: ' + filename);
    }
  }

  async function extractBundle(zipBlob) {
    const zip = await JSZip.loadAsync(zipBlob);
    const files = Object.keys(zip.files);

    const datEntry = files.find(f => f.endsWith('.dat.zip'));
    const jpgEntry = files.find(f => f.endsWith('.jpg') || f.endsWith('.jpeg'));

    if (!datEntry && !jpgEntry) {
      status('Error: zip contains no .dat.zip or .jpg files.');
      return false;
    }

    if (datEntry) {
      overrides[TARGET_DAT] = await zip.file(datEntry).async('arraybuffer');
      status('Extracted ' + datEntry + ' -> ' + TARGET_DAT);
    }
    if (jpgEntry) {
      overrides[TARGET_JPG] = await zip.file(jpgEntry).async('arraybuffer');
      status('Extracted ' + jpgEntry + ' -> ' + TARGET_JPG);
    }

    return true;
  }

  document.getElementById('input-bundle').addEventListener('change', async e => {
    const f = e.target.files[0];
    if (!f) return;
    status('Reading bundle...');
    await extractBundle(f);
  });

  async function loadFromURL(url) {
    status('Fetching ' + url + '...');
    let res;
    try {
      res = await fetch(url);
    } catch (err) {
      status('Fetch error: ' + err.message);
      return false;
    }
    if (!res.ok) {
      status('Fetch failed: ' + res.status + ' ' + res.statusText);
      return false;
    }
    const blob = await res.blob();
    return await extractBundle(blob);
  }

  async function checkURLParams() {
    const params = new URLSearchParams(window.location.search);
    const levelURL = params.get('level');
    if (!levelURL) return;

    status('URL parameter detected, fetching level...');
    const ok = await loadFromURL(levelURL);
    if (ok) {
      status('Remote level loaded. Launching...');
      await launchRuffle();
    }
  }

  async function launchRuffle() {
    if (!('serviceWorker' in navigator)) {
      status('Cannot launch: service workers not supported.');
      return;
    }

    await sendOverridesToSW();
    status('All overrides confirmed. Launching...');

    const container = document.getElementById('ruffle-container');

    if (playerEl) {
      try { playerEl.pause(); } catch {}
      playerEl.remove();
      playerEl = null;
    }

    const ruffle = window.RufflePlayer.newest();
    playerEl = ruffle.createPlayer();
    playerEl.style.width = '100%';
    playerEl.style.height = '100%';
    container.appendChild(playerEl);

    playerEl.config = {
      autoplay: 'on',
      unmuteOverlay: 'hidden',
    };

    try {
      await playerEl.load('peggle.swf');
      status('Running. Overrides active.');
    } catch (err) {
      status('Error: ' + err.message);
    }
  }

  document.getElementById('btn-restart').addEventListener('click', launchRuffle);

  window.addEventListener('load', async () => {
    await getActiveSW();
    await checkURLParams();
  });
</script>
</body>
</html>
