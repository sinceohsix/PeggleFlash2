<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Peggle Loader</title>
  <style>
    body { font-family: sans-serif; margin: 16px; }
    label { display: block; margin-top: 10px; }
    input, button { margin-top: 4px; display: block; }
    #ruffle-container { margin-top: 16px; width: 640px; height: 480px; background: #000; }
    #ruffle-container ruffle-player { width: 100%; height: 100%; }
    #status { margin-top: 8px; font-size: 12px; color: #555; }
  </style>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

  <label>Level name: <input type="text" id="level-name" value="funnel" /></label>
  <label>.dat.zip: <input type="file" id="input-dat" accept=".zip" /></label>
  <label>.jpg: <input type="file" id="input-jpg" accept=".jpg,.jpeg" /></label>
  <button id="btn-load">Launch</button>
  <button id="btn-restart">Restart Ruffle</button>
  <div id="status">Ready.</div>
  <div id="ruffle-container"></div>

<script>
  const overrides = {};
  let playerEl = null;

  function status(msg) {
    document.getElementById('status').textContent = msg;
  }

  // Get the active SW, waiting for it to become active if needed
  async function getActiveSW() {
    const reg = await navigator.serviceWorker.ready;
    // .ready resolves only when a SW is active, so this should always be set
    // but guard just in case
    if (reg.active) return reg.active;
    // Fallback: wait for statechange
    return new Promise(resolve => {
      const sw = reg.installing || reg.waiting;
      sw.addEventListener('statechange', function handler() {
        if (this.state === 'activated') {
          sw.removeEventListener('statechange', handler);
          resolve(this);
        }
      });
    });
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(() => {
      status('Service worker registered.');
    }).catch(err => {
      status('SW error: ' + err.message);
    });
  } else {
    status('Service workers not supported.');
  }

  document.getElementById('input-dat').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const key = document.getElementById('level-name').value.trim() + '.dat.zip';
    overrides[key] = f;
    status('Loaded: ' + f.name + ' -> ' + key);
  });

  document.getElementById('input-jpg').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const key = document.getElementById('level-name').value.trim() + '.jpg';
    overrides[key] = f;
    status('Loaded: ' + f.name + ' -> ' + key);
  });

  function sendOne(active, filename, buffer) {
    return new Promise(resolve => {
      const handler = e => {
        if (e.data.type === 'ACK' && e.data.filename === filename) {
          navigator.serviceWorker.removeEventListener('message', handler);
          resolve();
        }
      };
      navigator.serviceWorker.addEventListener('message', handler);
      active.postMessage({ type: 'OVERRIDE', filename, buffer }, [buffer]);
    });
  }

  function sendClear(active) {
    return new Promise(resolve => {
      const handler = e => {
        if (e.data.type === 'ACK' && e.data.action === 'CLEAR') {
          navigator.serviceWorker.removeEventListener('message', handler);
          resolve();
        }
      };
      navigator.serviceWorker.addEventListener('message', handler);
      active.postMessage({ type: 'CLEAR' });
    });
  }

  async function sendOverridesToSW() {
    status('Waiting for service worker...');
    const active = await getActiveSW();
    status('Clearing previous overrides...');
    await sendClear(active);
    for (const [filename, blob] of Object.entries(overrides)) {
      const buffer = await blob.arrayBuffer();
      await sendOne(active, filename, buffer);
      status('SW confirmed: ' + filename);
    }
  }

  async function launchRuffle() {
    if (!('serviceWorker' in navigator)) {
      status('Cannot launch: service workers not supported.');
      return;
    }

    await sendOverridesToSW();
    status('All overrides confirmed. Launching...');

    const container = document.getElementById('ruffle-container');

    if (playerEl) {
      try { playerEl.pause(); } catch {}
      playerEl.remove();
      playerEl = null;
    }

    const ruffle = window.RufflePlayer.newest();
    playerEl = ruffle.createPlayer();
    playerEl.style.width = '100%';
    playerEl.style.height = '100%';
    container.appendChild(playerEl);

    playerEl.config = {
      autoplay: 'on',
      unmuteOverlay: 'hidden',
    };

    try {
      await playerEl.load('peggle.swf');
      status('Running. Overrides active.');
    } catch (err) {
      status('Error: ' + err.message);
    }
  }

  document.getElementById('btn-load').addEventListener('click', launchRuffle);
  document.getElementById('btn-restart').addEventListener('click', launchRuffle);
</script>
</body>
</html>
