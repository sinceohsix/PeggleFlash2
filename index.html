<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Peggle Custom Loader</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="ui">

  <h2>Peggle Loader</h2>

  <div class="panel">
    <label>Level ZIP (funnel.dat.zip)</label>
    <input type="file" id="levelZip" accept=".zip,.dat.zip">
  </div>

  <div class="panel">
    <label>Background Image (funnel.jpg)</label>
    <input type="file" id="bgFile" accept="image/*">
    <img id="bgPreview" />
  </div>

  <button id="restart">Restart Ruffle</button>

</div>

<div id="gameContainer"></div>

<script src="main.js"></script>

</body>
</html>
